# Black swan scenario — sudden unexpected events for RQ3
grid_width: 50
grid_height: 50
building_density: 0.25
num_victims: 30
num_fires: 10
victim_decay_rate: 1.5
fire_spread_prob: 0.05
max_steps: 50
seed: 42

seismic:
  epicenter: [25, 25]
  magnitude: 6.5
  decay_k: 0.05
  intensity_scale: 1.0
  aftershocks:
    - step: 8
      magnitude: 5.0
  black_swans:
    # Sudden building collapse at step 15
    - step: 15
      type: collapse
      building_id: 2
    # Sudden fire outbreak at step 20
    - step: 20
      type: fire
      position: [30, 30]
      intensity: 80
    # Another collapse at step 30
    - step: 30
      type: collapse
      building_id: 5

agents:
  num_scouts: 3
  num_firefighters: 3
  num_medics: 4

controller_mode: hierarchical
commander_type: heuristic
dropout_rate: 0.0
message_mode: semantic
