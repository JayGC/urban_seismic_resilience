# High density scenario — many victims/fires, fast decay
# Base config shared across RQ1–RQ4; experiments override specific fields.
grid_width: 50
grid_height: 50
building_density: 0.30
num_victims: 155
num_fires: 20
victim_decay_rate: 2.0
fire_spread_prob: 0.08
max_steps: 50
seed: 42

seismic:
  epicenter: [25, 25]
  magnitude: 7.9
  decay_k: 0.1
  intensity_scale: 2.3
  # aftershocks:
  #   - step: 8
  #     magnitude: 5.0
  #   - step: 15
  #     magnitude: 4.5
  # black_swans: []

agents:
  num_scouts: 12
  num_firefighters: 8
  num_medics: 8

controller_mode: hierarchical
commander_type: llm #heuristic
dropout_rate: 0.0
message_mode: semantic
