# Medium density scenario — moderate victims/fires, standard decay
# Base config shared across RQ1–RQ4; experiments override specific fields.
grid_width: 50
grid_height: 50
building_density: 0.25
num_victims: 155
num_fires: 10
victim_decay_rate: 1.5
fire_spread_prob: 0.05
max_steps: 50
seed: 42

seismic:
  epicenter: [25, 25]
  magnitude: 7.7
  decay_k: 0.2
  intensity_scale: 2.0
  # aftershocks:
  #   - step: 8
  #     magnitude: 5.0
  #   - step: 15
  #     magnitude: 4.5
  # black_swans: []

agents:
  num_scouts: 12
  num_firefighters: 8
  num_medics: 8

controller_mode: hierarchical
commander_type: llm #heuristic
dropout_rate: 0.0
message_mode: semantic
